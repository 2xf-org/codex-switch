name: Build

on:
  push:
  pull_request:

jobs:
  app:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app
        run: ./build.sh

      - name: Package app
        run: ditto -c -k --keepParent "Codex Switch.app" "Codex Switch.zip"

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: Codex Switch
          path: Codex Switch.zip
